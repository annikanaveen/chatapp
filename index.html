<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chat App</title>
        <script type="importmap">
            {
                "imports": {
                    "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
                    "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@4/dist/vue-router.esm-browser.js",
                    "@vue/devtools-api": "https://cdn.jsdelivr.net/npm/@vue/devtools-api@6.6.4/lib/esm/index.js",
                    "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
                    "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
                    "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
                }
            }
        </script>
        <script src="index.js" type="module"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="app">Loading...</div>
        <template id="root-template">
            <main class="tab-content">
                <router-view />
            </main>
            <nav v-if="!hideBottomToolbar" class="bottom-toolbar">
                <router-link to="/messages" class="tab-link">Messages</router-link>
                <router-link to="/forms" class="tab-link">Forms</router-link>
                <router-link to="/calendar" class="tab-link">Calendar</router-link>
                <router-link to="/attendance" class="tab-link">Attendance</router-link>
                <router-link to="/links" class="tab-link">Links</router-link>
                <router-link to="/settings" class="tab-link">Settings</router-link>
            </nav>
        </template>
        <template id="messages-directory-template">
            <section class="messages-directory">
                <h1>Chats</h1>
                <button v-if="!$graffitiSession.value" @click="$graffiti.login()">
                    Log In
                </button>
                <template v-else>
                    <div class="directory-toolbar">
                        <button
                            type="button"
                            @click="$graffiti.logout($graffitiSession.value)"
                        >
                            Log Out
                        </button>
                    </div>
                    <div class="create-chat-block">
                        <h2>Create group chat</h2>
                        <form @submit.prevent="newChat()">
                            <input
                                type="text"
                                v-model="newChatTitle"
                                placeholder="Group name"
                            />
                            <input
                                type="submit"
                                :value="isCreatingChat ? 'Creating...' : 'Create group'"
                                :disabled="!canCreateChat || isCreatingChat"
                            />
                        </form>
                    </div>
                    <div class="chat-list">
                        <h2>Your chats</h2>
                        <p v-if="areChatsLoading">
                            <em>Loading chats...</em>
                        </p>
                        <div v-else v-for="chat in availableChats" :key="chat.channel">
                            <router-link
                                :to="chatRoute(chat.channel)"
                                class="chat-link chat-link-row"
                            >
                                <span class="chat-link-title">{{ chat.title }}</span>
                                <span class="chat-link-chevron" aria-hidden="true">›</span>
                            </router-link>
                        </div>
                    </div>
                </template>
            </section>
        </template>
        <template id="messages-thread-template">
            <section class="messages-thread-screen">
                <header class="messages-thread-header">
                    <button
                        type="button"
                        class="thread-back-btn"
                        @click="goToChannelList()"
                    >
                        ← Chats
                    </button>
                    <h1 class="messages-thread-title">{{ selectedChat.title }}</h1>
                    <div class="thread-header-actions">
                        <button
                            v-if="$graffitiSession.value && canLeaveSelectedChat"
                            type="button"
                            class="thread-leave-btn"
                            @click="leaveChat()"
                            :disabled="isLeavingChat"
                        >
                            {{ isLeavingChat ? "…" : "Leave" }}
                        </button>
                    </div>
                </header>

                <p v-if="!$graffitiSession.value" class="thread-login-banner">
                    <button type="button" @click="$graffiti.login()">Log in</button>
                    to send messages in this chat.
                </p>
                <div class="messages-thread-scroll">
                    <p v-if="areMessageObjectsLoading" class="thread-loading">
                        <em>Loading messages…</em>
                    </p>
                    <ul v-else class="messages-list thread-messages-list">
                        <li
                            v-for="object of sortedMessageObjects"
                            :key="object.url"
                        >
                            <message-bubble
                                :actor="object.actor"
                                :content="object.value.content"
                                :published="object.value.published"
                                :session-actor="$graffitiSession.value?.actor"
                            >
                                <template #actions>
                                    <button
                                        v-if="$graffitiSession.value && object.actor===$graffitiSession.value?.actor"
                                        type="button"
                                        @click="deleteMessage(object)"
                                        :disabled="isDeleting.has(object.url)"
                                    >
                                        {{
                                            isDeleting.has(object.url)
                                                ? "Deleting…"
                                                : "Delete"
                                        }}
                                    </button>
                                </template>
                            </message-bubble>
                        </li>
                    </ul>
                </div>
                <footer
                    v-if="$graffitiSession.value"
                    class="messages-thread-composer"
                >
                    <form @submit.prevent="sendMessage()">
                        <input
                            type="text"
                            v-model="myMessage"
                            placeholder="Message"
                            autocomplete="off"
                        />
                        <input
                            type="submit"
                            :value="isSending ? 'Sending…' : 'Send'"
                            :disabled="!canSendMessage || isSending"
                        />
                    </form>
                </footer>
            </section>
        </template>
        <template id="placeholder-template">
            <section class="placeholder-view">
                <h1>{{ title }}</h1>
                <p>{{ description }}</p>
            </section>
        </template>
    </body>
</html>
